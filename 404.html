<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Page not found | Mark Signals</title>
  <script>
    (() => {
      const orthopedicCampaignPath = /^\/campaign\/orthopedic-50-buyer-validation\/orthopedic-bd-v\d+\/[0-9a-f]{32}\/?$/;
      if (orthopedicCampaignPath.test(window.location.pathname)) {
        window.location.replace("/orthopedic-clearance-signal/");
      }
    })();
  </script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/site.css">
</head>
<body>
  <main class="shell">
    <section class="hero" aria-labelledby="not-found-title">
      <p class="eyebrow">Mark Signals</p>
      <h1 id="not-found-title">Page not found.</h1>
      <p>The address may be outdated or incomplete.</p>
      <p><a class="button" href="/">Go to Mark Signals</a></p>
    </section>
  </main>
</body>
</html>
